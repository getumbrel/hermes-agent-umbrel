services:
  # Web terminal UI + dashboard (proxied through Node server)
  web:
    build: .
    image: hermes-agent-umbrel:latest
    container_name: hermes-web
    restart: unless-stopped
    init: true
    user: "1000:1000"
    environment:
      APP_SEED: ${APP_SEED:-dev} # Provided by umbrelOS; fallback for local dev
      # Tells the dashboard to probe the gateway via HTTP instead of local PID detection
      GATEWAY_HEALTH_URL: http://hermes-gateway:8642
    ports:
      - "18789:18789"
    volumes:
      - ./data:/opt/data
    networks:
      - hermes-net
    depends_on:
      - gateway

  # Hermes messaging gateway
  gateway:
    # Pinned to latest (v2026.4.13) by digest — see Dockerfile comment
    image: nousresearch/hermes-agent:latest@sha256:b0f87728fb313f97c91d19178624a2a67375d6ceeb27800853c866f94c42dfed
    container_name: hermes-gateway
    restart: unless-stopped
    command: gateway run
    environment:
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      # API server exposes the health endpoint the dashboard probes via GATEWAY_HEALTH_URL.
      # Must bind to 0.0.0.0 (not default 127.0.0.1) to be reachable from the web container.
      # Binding to 0.0.0.0 requires an API key — we reuse APP_SEED since the port is
      # internal only (not exposed to host).
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${APP_SEED:-hermes-internal-key}
    volumes:
      - ./data:/opt/data
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
