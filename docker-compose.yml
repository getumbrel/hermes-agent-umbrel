services:
  # Web terminal UI + dashboard (proxied through Node server)
  web:
    build: .
    image: hermes-agent-umbrel:latest
    container_name: hermes-web
    restart: unless-stopped
    init: true
    user: "1000:1000"
    environment:
      APP_SEED: ${APP_SEED:-dev} # Provided by umbrelOS; fallback for local dev
      # GATEWAY_HEALTH_URL was merged (45595f48, 2026-04-14) but not yet released.
      # Until a new image includes it, the dashboard's gateway status card will
      # show "stopped" because it falls back to local PID detection which can't
      # see across containers. Remove this comment once the fix is released.
      GATEWAY_HEALTH_URL: http://hermes-gateway:8642
    ports:
      - "18789:18789"
    volumes:
      - ./data:/opt/data
    networks:
      - hermes-net
    depends_on:
      - gateway

  # Hermes messaging gateway
  gateway:
    # Pinned to latest (v2026.4.13) by digest — see Dockerfile comment
    image: nousresearch/hermes-agent:latest@sha256:b0f87728fb313f97c91d19178624a2a67375d6ceeb27800853c866f94c42dfed
    container_name: hermes-gateway
    restart: unless-stopped
    command: gateway run
    environment:
      HERMES_UID: "1000"
      HERMES_GID: "1000"
    volumes:
      - ./data:/opt/data
    # API_SERVER_ENABLED: "true" — not needed until GATEWAY_HEALTH_URL fix is released.
    # Add it back (along with API_SERVER_KEY for inter-container auth) when the
    # dashboard can actually probe the gateway over HTTP.
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
